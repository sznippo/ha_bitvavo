name: Bitvavo MQTT Sensors
version: "0.1.0"
slug: bitvavo_mqtt_sensors
description: Publish Bitvavo account and market data as Home Assistant sensors via MQTT.
startup: services
boot: auto
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
options:
  bitvavo_api_key: ""
  bitvavo_api_secret: ""
  operator_id: ""
  markets: "BTC-EUR,ETH-EUR"
  poll_interval: 30
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_topic_prefix: "bitvavo"
  mqtt_tls: false
schema:
  bitvavo_api_key: str
  bitvavo_api_secret: password
  operator_id: str?
  markets: str
  poll_interval: int(10,3600)
  mqtt_host: str
  mqtt_port: port
  mqtt_username: str?
  mqtt_password: password?
  mqtt_topic_prefix: str
  mqtt_tls: bool
