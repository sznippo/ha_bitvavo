name: HACS Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare release archive
        run: |
          mkdir -p dist
          zip -r dist/bitvavo_hacs.zip custom_components hacs.json README.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/bitvavo_hacs.zip
          generate_release_notes: true
